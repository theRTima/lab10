services:
  go-backend:
    build: 
      context: ./go-service
    networks:
      - lab-network
    environment:
      - PORT=8080
      - JWT_SECRET=dev-secret-change-me
    ports:
      - "8080:8080"

  python-gateway:
    build: 
      context: ./python-service
    ports:
      - "8000:8000"
    networks:
      - lab-network
    environment:
      - GO_BACKEND_URL=http://go-backend:8080 
      - JWT_SECRET=dev-secret-change-me
    depends_on:
      - go-backend

networks:
  lab-network:
    driver: bridge